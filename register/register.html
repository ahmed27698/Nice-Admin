<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NiceAdmin — Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/66944bb815.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="auth-page">
  <a href="../index.html" class="auth-logo">
    <img src="../imgs/logo.png" alt="NiceAdmin logo">
    <span>NiceAdmin</span>
  </a>

  <div class="auth-card">
    <h2>Create an account</h2>
    <p class="auth-subtitle">Enter your details to get started</p>

    <form novalidate>
      <div class="mb-3">
        <label class="form-label" for="regName">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
          <input type="text" class="form-control" id="regName" placeholder="Kevin Anderson" autocomplete="name">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="regUsername">Username</label>
        <div class="input-group">
          <span class="input-group-text">@</span>
          <input type="text" class="form-control" id="regUsername" placeholder="kevanderson" autocomplete="username">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="regEmail">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
          <input type="email" class="form-control" id="regEmail" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="regPassword">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" class="form-control" id="regPassword" placeholder="Min. 8 characters" autocomplete="new-password">
          <button type="button" class="input-group-text" id="togglePassword" style="cursor:pointer;border-left:none">
            <i class="fa-regular fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="termsCheck" required>
          <label class="form-check-label" for="termsCheck" style="font-size:0.85rem;color:var(--text-muted)">
            I agree to the <a href="#" style="color:var(--primary);text-decoration:none;font-weight:600">Terms &amp; Conditions</a>
          </label>
        </div>
      </div>

      <button type="submit" class="btn-auth">
        <i class="fa-solid fa-user-plus me-2"></i>Create Account
      </button>
    </form>

    <p class="auth-link">
      Already have an account? <a href="../log-in/log-in.html">Sign in</a>
    </p>
  </div>

  <p class="auth-footer">
    © NiceAdmin — Designed by <a href="https://bootstrapmade.com/">BootstrapMade</a>
  </p>
</div>

<script>
  const toggleBtn = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('regPassword');
  const eyeIcon = document.getElementById('eyeIcon');

  toggleBtn.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    eyeIcon.className = isPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
  });
</script>

</body>
</html>
