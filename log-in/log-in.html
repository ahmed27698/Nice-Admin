<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NiceAdmin — Log In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="https://kit.fontawesome.com/66944bb815.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="auth-page">
  <a href="../index.html" class="auth-logo">
    <img src="../imgs/logo.png" alt="NiceAdmin logo">
    <span>NiceAdmin</span>
  </a>

  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="auth-subtitle">Enter your credentials to access your account</p>

    <form novalidate>
      <div class="mb-3">
        <label class="form-label" for="loginEmail">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
          <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" autocomplete="email">
        </div>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label class="form-label mb-0" for="loginPassword">Password</label>
          <a href="#" style="font-size:0.8rem;color:var(--primary);text-decoration:none">Forgot password?</a>
        </div>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="input-group-text" id="togglePassword" style="cursor:pointer;border-left:none">
            <i class="fa-regular fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label" for="rememberMe" style="font-size:0.85rem;color:var(--text-muted)">
            Keep me signed in
          </label>
        </div>
      </div>

      <button type="submit" class="btn-auth">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <p class="auth-link">
      Don't have an account? <a href="../register/register.html">Create one</a>
    </p>
  </div>

  <p class="auth-footer">
    © NiceAdmin — Designed by <a href="https://bootstrapmade.com/">BootstrapMade</a>
  </p>
</div>

<script>
  const toggleBtn = document.getElementById('togglePassword');
  const passwordInput = document.getElementById('loginPassword');
  const eyeIcon = document.getElementById('eyeIcon');

  toggleBtn.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    eyeIcon.className = isPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
  });
</script>

</body>
</html>
